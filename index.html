<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6dfa;
      --accent-soft: rgba(124,109,250,0.12);
      --text-primary: #f0eeff;
      --text-secondary: rgba(240,238,255,0.5);
      --text-muted: rgba(240,238,255,0.28);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(124,109,250,0.18) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 540px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-soft);
      border: 1px solid rgba(124,109,250,0.25);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 7vw, 4.2rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--text-secondary);
      font-weight: 300;
      max-width: 400px;
      margin: 0 auto 2.5rem;
      line-height: 1.75;
    }

    .notify-form {
      display: flex;
      gap: 10px;
      max-width: 400px;
      margin: 0 auto 3rem;
    }

    .notify-form input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 14px;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .notify-form input::placeholder { color: var(--text-muted); }
    .notify-form input:focus { border-color: rgba(124,109,250,0.45); }

    .notify-form button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 20px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
    }

    .notify-form button:hover { opacity: 0.88; }
    .notify-form button:active { transform: scale(0.97); }

    .divider {
      width: 1px;
      height: 40px;
      background: var(--border);
      margin: 0 auto 2rem;
    }

    .meta {
      font-size: 13px;
      color: var(--text-muted);
    }

    .meta a {
      color: var(--text-secondary);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: color 0.2s;
    }

    .meta a:hover { color: var(--text-primary); }

    @media (max-width: 480px) {
      .notify-form { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">
      <span class="badge-dot"></span>
      Something is coming
    </div>

    <h1>
      Big things<br />
      take <em>time.</em>
    </h1>

    <p class="subtitle">
         I'm crafting something exciting behind the scenes. Leave your email, and I'll let you know the moment the website goes live.
    </p>

    <div class="notify-form">
      <input type="email" placeholder="your@email.com" />
      <button type="button">Notify me</button>
    </div>

    <div class="divider"></div>

    <p class="meta">
      Questions? Reach us at <a href="mailto:hello@jahangirabbas.com">hello@jahangirabbas.com</a>
    </p>
  </div>
</body>
</html>
